services:
  - type: web
    name: snapchat-app
    env: node
    region: oregon
    plan: free
    buildCommand: >-
      npm install -g pnpm@10 &&
      pnpm install --frozen-lockfile &&
      PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/snapchat-clone run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
